
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>CONCRETE ONE</title>
    <style>
        body { background: #0a0c10 !important; color: #ffffff !important; font-family: sans-serif !important; margin: 0 !important; padding: 20px !important; }
        .box { background: #16191f !important; border: 1px solid #282c35 !important; border-radius: 15px !important; padding: 15px !important; margin-bottom: 20px !important; width: 100% !important; box-sizing: border-box !important; }
        h3 { color: #ffcc00 !important; text-align: center !important; margin: 0 0 15px 0 !important; }
        button { width: 100% !important; padding: 15px !important; border-radius: 10px !important; border: none !important; margin-top: 10px !important; font-weight: bold !important; cursor: pointer !important; }
        .grid-box { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
        .btn-gold { background: #ffcc00 !important; color: #000 !important; }
        .btn-green { background: #00ffaa !important; color: #000 !important; }
        .btn-red { background: #ff3300 !important; color: #fff !important; }
        .btn-dark { background: #333 !important; color: #fff !important; }
    </style>
</head>
<body>
    <h1 style="color: #ffcc00; text-align: center;">CONCRETE ONE</h1>
    
    <div class="box">
        <h3>اعتماد الصب</h3>
        <button class="btn-gold">تفعيل النظام</button>
    </div>

    <div class="box">
        <h3>حاسبة الكميات</h3>
        <div class="grid-box">
            <button class="btn-dark">سن</button>
            <button class="btn-dark">رمل</button>
            <button class="btn-dark">إسمنت</button>
            <button class="btn-dark">زلط</button>
        </div>
    </div>

    <div class="box">
        <button class="btn-green">🛡️ إصدار عقد ضمان رقمي</button>
    </div>

    <div class="box" style="border: 1px dashed #ff3300 !important;">
        <h3 style="color:#ff3300 !important;">🌍 جسر الصفقات</h3>
        <button class="btn-red">سحب طلبات Facebook/Twitter</button>
    </div>

    <div class="box" style="background:#fff !important; color:#000 !important;">
        <h3 style="color:#000 !important;">🏆 العضوية الذهبية</h3>
        <button class="btn-gold">خصومات VIP</button>
        <button class="btn-dark">نظام نقاط الولاء</button>
    </div>
</body>
</html>
