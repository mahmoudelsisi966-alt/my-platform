





<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCRETE ONE</title>
    <style>
        body { background: #0a0c10; color: #ffffff; font-family: sans-serif; margin: 0; padding: 15px; }
        .box { background: #16191f; border: 1px solid #282c35; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        h3 { color: #ffcc00; text-align: center; margin-top: 0; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-gold { background: #ffcc00; color: #000; }
        .btn-green { background: #00ffaa; color: #000; }
        .btn-red { background: #ff3300; color: #fff; }
        .elite-box { background: #fff !important; color: #000 !important; }
    </style>
</head>
<body>
    <h1 style="color: #ffcc00; text-align: center;">CONCRETE ONE</h1>
    
    <div class="box">
        <h3>اعتماد الصب</h3>
        <button class="btn-gold">تفعيل النظام</button>
    </div>

    <div class="box">
        <h3>حاسبة الكميات</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <button style="background:#333; color:#fff;">سن</button>
            <button style="background:#333; color:#fff;">رمل</button>
            <button style="background:#333; color:#fff;">إسمنت</button>
            <button style="background:#333; color:#fff;">زلط</button>
        </div>
    </div>

    <div class="box">
        <button class="btn-green">🛡️ إصدار عقد ضمان رقمي</button>
    </div>

    <div class="box" style="border: 1px dashed #ff3300;">
        <h3 style="color:#ff3300;">🌍 جسر الصفقات</h3>
        <button class="btn-red">سحب طلبات Facebook/Twitter</button>
    </div>

    <div class="box elite-box">
        <h3>🏆 العضوية الذهبية</h3>
        <button class="btn-gold">خصومات VIP</button>
    </div>
</body>
</html>
