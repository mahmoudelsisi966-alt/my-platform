
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCRETE ONE</title>
    <style>
        body { background: #0a0c10; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { padding: 18px; background: #16191f; border: 1px solid #282c35; border-radius: 16px; color: #fff; margin-bottom: 12px; cursor: pointer; display: flex; flex-direction: column; gap: 5px; text-decoration: none; border: none; width: 100%; text-align: right; }
        .btn-gold { padding: 14px; background: #ffcc00; border: none; border-radius: 12px; font-weight: bold; color: #000; width: 100%; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="color: #ffcc00; margin: 0;">CONCRETE ONE</h1>
        <div style="width: 40px; height: 40px; background: #1c1e22; borderRadius: 50%;"></div>
    </div>

    <button class="card" onclick="alert('تفعيل: اعتماد الصب')">
        <span style="font-size: 16px; font-weight: bold;">اعتماد الصب</span>
        <span style="font-size: 10px; color: #888;">نظام آمن وموثق</span>
    </button>

    <button class="card" onclick="alert('تفعيل: فحص المعدات')">
        <span style="font-size: 16px; font-weight: bold;">فحص المعدات</span>
        <span style="font-size: 10px; color: #888;">بمب / خلاطة / سيلو</span>
    </button>

    <div style="background: #13161a; padding: 20px; border-radius: 20px; border: 1px solid #222;">
        <p style="margin: 0 0 10px 0; fontSize: 12px; color: #00d4ff;">مؤشر النمو الذكي</p>
        <button class="btn-gold" onclick="alert('تفعيل: الوساطة')">تفعيل محرك الوساطة</button>
    </div>
</body>
</html>
